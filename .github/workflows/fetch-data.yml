name: Fetch SharePoint Data

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Confirm data refresh (type YES)'
        required: true
        default: 'NO'
      notes:
        description: 'Reason for refresh (optional)'
        required: false

# ── Approval gate ──────────────────────────────────────────────────────────
# Go to Settings → Environments → New environment → name it "data-refresh"
# Add required reviewers there. No one can run this without approval.

jobs:
  fetch:
    name: Fetch & Index SharePoint Documents
    runs-on: ubuntu-latest
    environment: data-refresh          # <-- approval gate lives here
    permissions:
      contents: write                  # required to push the updated documents.json back

    # Hard-stop if user didn't type YES
    if: ${{ github.event.inputs.confirm == 'YES' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}  # falls back to GITHUB_TOKEN if GH_PAT is not set

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: extractor/requirements.txt

      - name: Install extractor dependencies
        run: pip install -r extractor/requirements.txt

      - name: Run SharePoint extractor
        working-directory: extractor
        env:
          # Azure AD app-only credentials (add these as GitHub Secrets)
          # See SETUP.md for how to register the Azure AD app
          TENANT_ID:     ${{ secrets.TENANT_ID }}
          CLIENT_ID:     ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          # SharePoint site config (set as GitHub Variables, not Secrets)
          SHAREPOINT_HOST: ${{ vars.SHAREPOINT_HOST || 'anheuserbuschinbev.sharepoint.com' }}
          SITE_PATH:       ${{ vars.SITE_PATH || '/sites/Sustinability' }}
          DRIVE_NAME:      ${{ vars.DRIVE_NAME || 'Shared Documents' }}
        run: python extract.py

      - name: Commit updated documents.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge-base-app/public/data/documents.json
          git add knowledge-base-app/public/data/kb-meta.json 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "data: refresh SharePoint index $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push

      - name: Trigger Pages redeploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT || github.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            })
            core.info('Pages deploy triggered')

      - name: Summary
        run: |
          echo "## Data Refresh Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: **${{ github.actor }}**" >> $GITHUB_STEP_SUMMARY
          echo "- Notes: ${{ github.event.inputs.notes || 'none' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Site will be live in ~2 minutes" >> $GITHUB_STEP_SUMMARY
